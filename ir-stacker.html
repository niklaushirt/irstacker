<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Stacker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --surface2: #0f3460;
  --accent: #e94560;
  --accent2: #533483;
  --text: #eaeaea;
  --text-dim: #8892a4;
  --border: #2a3a5c;
  --knob: #e94560;
  --knob-track: #2a3a5c;
  --success: #4ecca3;
  --slot-bg: #1c2541;
}

body {
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-actions {
  display: flex;
  gap: 10px;
}

.btn {
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.btn:hover { background: var(--border); border-color: var(--text-dim); }
.btn-primary { background: var(--accent); border-color: var(--accent); }
.btn-primary:hover { background: #d63851; }
.btn-success { background: var(--success); border-color: var(--success); color: #111; }
.btn-success:hover { opacity: 0.85; }

.main {
  padding: 24px 32px;
  max-width: 1400px;
  margin: 0 auto;
}

.slots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.slot {
  background: var(--slot-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  transition: border-color 0.2s;
}

.slot:hover { border-color: var(--accent); }

.slot-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.slot-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.slot-number {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--accent2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
}

.slot-drop {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 28px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 14px;
}

.slot-drop:hover, .slot-drop.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(233, 69, 96, 0.05);
}

.slot-drop.has-file {
  border-style: solid;
  border-color: var(--success);
  padding: 10px 16px;
  color: var(--success);
  cursor: default;
}

.slot-waveform {
  width: 100%;
  height: 60px;
  border-radius: 6px;
  background: rgba(0,0,0,0.3);
  margin-bottom: 14px;
  display: block;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.control-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
}

.control-value {
  font-size: 11px;
  color: var(--accent);
  text-align: right;
  font-weight: 600;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--knob-track);
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--knob);
  cursor: pointer;
  box-shadow: 0 0 6px rgba(233, 69, 96, 0.4);
}

.polarity-btn {
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  font-size: 10px;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}

.polarity-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(233, 69, 96, 0.1);
}

.polarity-btn:hover { border-color: var(--text-dim); }

.auto-align-btn {
  margin-top: 10px;
  width: 100%;
  padding: 7px;
  border: 1px solid var(--accent2);
  border-radius: 5px;
  background: rgba(83, 52, 131, 0.2);
  color: var(--text-dim);
  font-size: 10px;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}

.auto-align-btn:hover {
  background: rgba(83, 52, 131, 0.4);
  color: var(--text);
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.phase-section {
  margin-bottom: 28px;
}

.phase-heatmap {
  width: 100%;
  border-radius: 10px;
  background: var(--slot-bg);
  border: 1px solid var(--border);
  padding: 16px;
}

.phase-canvas {
  width: 100%;
  height: 200px;
  border-radius: 6px;
  display: block;
}

.export-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.export-info {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
}

.export-actions {
  display: flex;
  gap: 10px;
}

.play-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  background: rgba(233, 69, 96, 0.15);
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.play-btn:hover { background: rgba(233, 69, 96, 0.3); }

.master-vol {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.master-vol label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-dim);
  width: 50px;
}

.master-vol input {
  flex: 1;
}

.status-bar {
  margin-top: 16px;
  padding: 8px 14px;
  background: rgba(78, 204, 163, 0.08);
  border: 1px solid rgba(78, 204, 163, 0.2);
  border-radius: 6px;
  font-size: 11px;
  color: var(--success);
  display: none;
}

.status-bar.visible { display: block; }

.hidden-input { display: none; }

@media (max-width: 768px) {
  .main { padding: 16px; }
  .slots-grid { grid-template-columns: 1fr; }
  .controls { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>NICKS IR STACKER</h1>
  <div class="header-actions">
    <button class="btn" onclick="addSlot()">+ ADD SLOT</button>
  </div>
</div>

  <div class="main">
  <div class="slots-grid" id="slotsGrid"></div>

  <div class="phase-section">
    <div class="section-title">Mixed Waveform</div>
    <div class="phase-heatmap">
      <canvas class="phase-canvas" id="mixedCanvas"></canvas>
    </div>
  </div>

  <div class="phase-section">
    <div class="section-title">Phase Coherence Matrix</div>
    <div class="phase-heatmap">
      <canvas class="phase-canvas" id="phaseCanvas"></canvas>
    </div>
  </div>

  <div class="export-section">
    <div>
      <div class="section-title" style="margin-bottom:8px">Master Output</div>
      <div class="master-vol">
        <label>Level</label>
        <input type="range" min="0" max="100" value="80" id="masterVolume" oninput="updateMaster()">
        <span class="control-value" id="masterVolVal">0.80</span>
      </div>
      <div class="export-info">
        Stacked IRs will be summed with individual volume, pan, and delay controls.<br>
        Use "Auto Align" on each slot to find optimal phase alignment via cross-correlation.
      </div>
    </div>
    <div class="export-actions">
      <button class="play-btn" id="playBtn" onclick="togglePlay()" title="Play">▶</button>
      <button class="btn btn-success" onclick="exportWav()">EXPORT WAV</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar"></div>
</div>

<input type="file" id="fileInput" class="hidden-input" accept=".wav,.mp3,.ogg,.aif,.aiff,.flac" multiple>

<script>
const SAMPLE_RATE = 48000;
const MAX_SLOTS = 8;
const IR_SIZE = 4096;

let slots = [];
let audioCtx = null;
let isPlaying = false;
let masterGain = null;
let masterPanner = null;
let sourceNode = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
  return audioCtx;
}

function showStatus(msg) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 4000);
}

function loadWav(arrayBuffer) {
  const ctx = getAudioCtx();
  return ctx.decodeAudioData(arrayBuffer);
}

function padToLength(buffer, targetLen) {
  if (buffer.length >= targetLen) return buffer.slice(0, targetLen);
  const padded = new Float32Array(targetLen);
  padded.set(buffer);
  return padded;
}

function computeCrossCorrelation(a, b) {
  const len = Math.min(a.length, b.length);
  let maxCorr = -Infinity;
  let maxLag = 0;
  const halfMax = Math.min(256, len - 1);

  let sumA = 0, sumB = 0, sumAA = 0, sumBB = 0;
  for (let i = 0; i < len; i++) {
    sumA += a[i]; sumB += b[i];
    sumAA += a[i] * a[i]; sumBB += b[i] * b[i];
  }
  const meanA = sumA / len, meanB = sumB / len;

  for (let lag = -halfMax; lag <= halfMax; lag++) {
    let corr = 0;
    const start = lag >= 0 ? 0 : -lag;
    const end = lag >= 0 ? len - lag : len;
    for (let i = start; i < end; i++) {
      corr += (a[i] - meanA) * (b[i + lag] - meanB);
    }
    const denom = Math.sqrt(sumAA * sumBB);
    if (denom > 0) corr /= denom;
    if (corr > maxCorr) {
      maxCorr = corr;
      maxLag = lag;
    }
  }
  return { correlation: maxCorr, lag: maxLag };
}

function autoAlignSlot(slotIdx) {
  const slot = slots[slotIdx];
  if (!slot.buffer) { showStatus('No IR loaded in slot ' + (slotIdx + 1)); return; }

  const refIdx = 0;
  for (let i = 0; i < slots.length; i++) {
    if (slots[i].buffer && i !== slotIdx) { refIdx = i; break; }
  }

  const ref = slots[refIdx];
  if (!ref.buffer) { showStatus('Reference slot has no IR'); return; }

  const result = computeCrossCorrelation(slot.buffer, ref.buffer);
  const delaySamples = result.lag;
  const delayMs = (delaySamples / SAMPLE_RATE * 1000).toFixed(2);

  slot.delaySamples = delaySamples;
  slot.delayMs = delayMs;

  const delaySlider = document.getElementById(`delay-${slotIdx}`);
  if (delaySlider) {
    const normalized = ((delaySamples + 256) / 512) * 100;
    delaySlider.value = Math.max(0, Math.min(100, normalized));
    document.getElementById(`delayVal-${slotIdx}`).textContent = delayMs + ' ms';
  }

  showStatus(`Slot ${slotIdx + 1}: aligned (lag: ${delaySamples} samples, ${delayMs} ms, r=${result.correlation.toFixed(3)})`);
  drawPhaseHeatmap();
  drawMixedWaveform();
}

function addSlot() {
  if (slots.length >= MAX_SLOTS) { showStatus('Max ' + MAX_SLOTS + ' slots'); return; }
  const idx = slots.length;
  slots.push({
    buffer: null,
    fileName: null,
    volume: 0.8,
    pan: 0,
    delaySamples: 0,
    delayMs: '0.00',
    polarity: false
  });
  renderSlots();
}

function removeSlot(idx) {
  slots.splice(idx, 1);
  renderSlots();
  drawPhaseHeatmap();
  drawMixedWaveform();
}

function handleFileLoad(file, slotIdx) {
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const buffer = await loadWav(e.target.result);
      const left = buffer.getChannelData(0);
      let mono = left;
      if (buffer.numberOfChannels > 1) {
        const right = buffer.getChannelData(1);
        mono = new Float32Array(left.length);
        for (let i = 0; i < left.length; i++) mono[i] = (left[i] + right[i]) * 0.5;
      }
      slots[slotIdx].buffer = mono;
      slots[slotIdx].fileName = file.name;
      slots[slotIdx].delaySamples = 0;
      slots[slotIdx].delayMs = '0.00';
      renderSlots();
      drawPhaseHeatmap();
      drawMixedWaveform();
      showStatus(`Loaded ${file.name} (${mono.length} samples, ${(mono.length / SAMPLE_RATE * 1000).toFixed(1)} ms)`);
    } catch (err) {
      showStatus('Error loading file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderSlots() {
  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = '';
  slots.forEach((slot, idx) => {
    const div = document.createElement('div');
    div.className = 'slot';
    div.innerHTML = `
      <div class="slot-header">
        <span class="slot-title">Slot ${idx + 1}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="slot-number">${idx + 1}</span>
          ${slots.length > 1 ? `<button class="btn" style="padding:3px 8px;font-size:10px" onclick="removeSlot(${idx})">×</button>` : ''}
        </div>
      </div>
      <div class="slot-drop ${slot.buffer ? 'has-file' : ''}"
           onclick="${slot.buffer ? '' : `triggerFile(${idx})`}"
           ondragover="event.preventDefault();this.classList.add('active')"
           ondragleave="this.classList.remove('active')"
           ondrop="event.preventDefault();this.classList.remove('active');handleFileLoad(event.dataTransfer.files[0],${idx})">
        ${slot.buffer
          ? `<div style="display:flex;align-items:center;gap:8px;justify-content:center">
               <span style="font-size:14px">🎵</span>
               <span style="font-size:12px;font-weight:600;color:var(--success)">${slot.fileName}</span>
             </div>`
          : `<div>Drop IR file here<br><small>or click to browse</small></div>`}
      </div>
      <input type="file" class="hidden-input" id="file-${idx}" accept=".wav,.mp3,.ogg,.aif,.aiff,.flac" onchange="handleSingleFile(this,${idx})">
      <canvas class="slot-waveform" id="wave-${idx}" height="60"></canvas>
      <div class="controls">
        <div class="control-group">
          <div class="control-label">Volume</div>
          <input type="range" min="0" max="100" value="${slot.volume * 100}"
                 oninput="slots[${idx}].volume=this.value/100;document.getElementById('volVal-${idx}').textContent=(this.value/100).toFixed(2)"
                 id="vol-${idx}">
          <div class="control-value" id="volVal-${idx}">${slot.volume.toFixed(2)}</div>
        </div>
        <div class="control-group">
          <div class="control-label">Pan</div>
          <input type="range" min="-100" max="100" value="${slot.pan * 100}"
                 oninput="slots[${idx}].pan=this.value/100;document.getElementById('panVal-${idx}').textContent=(this.value/100>=0?'+':'')+(this.value/100).toFixed(2)"
                 id="pan-${idx}">
          <div class="control-value" id="panVal-${idx}">${slot.pan >= 0 ? '+' : ''}${slot.pan.toFixed(2)}</div>
        </div>
        <div class="control-group">
          <div class="control-label">Delay</div>
          <input type="range" min="0" max="100" value="50"
                 id="delay-${idx}"
                 oninput="const v=(this.value/100)*512-256;slots[${idx}].delaySamples=Math.round(v);const ms=(v/SAMPLE_RATE*1000).toFixed(2);slots[${idx}].delayMs=ms;document.getElementById('delayVal-${idx}').textContent=ms+' ms'">
          <div class="control-value" id="delayVal-${idx}">0.00 ms</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="polarity-btn ${slot.polarity ? 'active' : ''}" onclick="togglePolarity(${idx},this)">
          POLARITY ▲/▼
        </button>
        <button class="auto-align-btn" onclick="autoAlignSlot(${idx})">
          AUTO ALIGN (cross-corr)
        </button>
      </div>
    `;
    grid.appendChild(div);

    setTimeout(() => drawSlotWaveform(idx), 0);
  });
}

function triggerFile(idx) {
  document.getElementById(`file-${idx}`).click();
}

function handleSingleFile(input, idx) {
  if (input.files[0]) handleFileLoad(input.files[0], idx);
}

function togglePolarity(idx, btn) {
  slots[idx].polarity = !slots[idx].polarity;
  btn.classList.toggle('active');
  drawSlotWaveform(idx);
}

function drawSlotWaveform(idx) {
  const canvas = document.getElementById(`wave-${idx}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, w, h);

  if (!slots[idx].buffer) return;

  const data = slots[idx].polarity ? slots[idx].buffer : slots[idx].buffer;
  const start = Math.max(0, slots[idx].delaySamples);
  const windowLen = Math.min(512, data.length - start);
  const slice = data.slice(start, start + windowLen);

  const mid = h / 2;
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  for (let i = 0; i < slice.length; i++) {
    const x = (i / slice.length) * w;
    const y = mid - slice[i] * (mid - 2);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.strokeStyle = 'rgba(233,69,96,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawMixedWaveform() {
  const canvas = document.getElementById('mixedCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  ctx.fillStyle = '#1c2541';
  ctx.fillRect(0, 0, w, h);

  const loaded = slots.filter(s => s.buffer);
  if (loaded.length === 0) {
    ctx.fillStyle = '#8892a4';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Load IRs to see the mixed waveform', w / 2, h / 2);
    return;
  }

  const maxLen = Math.max(...loaded.map(s => s.buffer.length));
  const displayLen = Math.max(1, Math.ceil(maxLen * 0.1));
  const mixed = new Float32Array(displayLen);
  for (const slot of loaded) {
    const srcData = slot.buffer;
    const start = Math.max(0, slot.delaySamples);
    const copyLen = Math.min(srcData.length, displayLen - start);
    const sign = slot.polarity ? -1 : 1;
    for (let i = 0; i < copyLen; i++) {
      mixed[start + i] += srcData[i] * slot.volume * sign;
    }
  }

  const mid = h / 2;
  ctx.strokeStyle = '#4ecca3';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  for (let i = 0; i < displayLen; i++) {
    const x = (i / displayLen) * w;
    const y = mid - mixed[i] * (mid - 3);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.strokeStyle = 'rgba(78,204,163,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#8892a4';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`${loaded.length} slot(s) mixed · first 10% · ${displayLen.toLocaleString()} samples · ${(displayLen / SAMPLE_RATE * 1000).toFixed(1)} ms`, 8, h - 8);
}

function drawPhaseHeatmap() {
  const canvas = document.getElementById('phaseCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  ctx.fillStyle = '#1c2541';
  ctx.fillRect(0, 0, w, h);

  const loaded = slots.filter(s => s.buffer);
  const labels = loaded.map((s, i) => i);
  const n = loaded.length;

  if (n < 2) {
    ctx.fillStyle = '#8892a4';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Load at least 2 IRs to see phase coherence', w / 2, h / 2);
    return;
  }

  const cellW = Math.min(80, (w - 60) / n);
  const cellH = Math.min(80, (h - 60) / n);
  const offsetX = (w - cellW * n) / 2;
  const offsetY = 20;

  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8892a4';
  for (let i = 0; i < n; i++) {
    ctx.fillText(`S${i + 1}`, offsetX + i * cellW + cellW / 2, offsetY - 6);
    ctx.save();
    ctx.translate(offsetX - 6, offsetY + i * cellH + cellH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(`S${i + 1}`, 0, 0);
    ctx.restore();
  }

  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      if (i === j) {
        ctx.fillStyle = '#4ecca3';
        ctx.fillRect(offsetX + i * cellW + 1, offsetY + j * cellH + 1, cellW - 2, cellH - 2);
        ctx.fillStyle = '#111';
        ctx.font = 'bold 13px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('1.00', offsetX + i * cellW + cellW / 2, offsetY + j * cellH + cellH / 2 + 5);
        continue;
      }

      const r = computeCrossCorrelation(loaded[i].buffer, loaded[j].buffer);
      const corr = r.correlation;
      const mapped = (corr + 1) / 2;
      const hue = (1 - mapped) * 240;
      ctx.fillStyle = `hsl(${hue}, 80%, 50%)`;
      ctx.globalAlpha = 0.3 + mapped * 0.7;
      ctx.fillRect(offsetX + i * cellW + 1, offsetY + j * cellH + 1, cellW - 2, cellH - 2);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(corr.toFixed(2), offsetX + i * cellW + cellW / 2, offsetY + j * cellH + cellH / 2 + 4);
    }
  }
}

function togglePlay() {
  const btn = document.getElementById('playBtn');
  if (isPlaying) {
    stopPlay();
    btn.textContent = '▶';
    isPlaying = false;
  } else {
    playStack();
    btn.textContent = '⏸';
    isPlaying = true;
  }
}

function stopPlay() {
  if (sourceNode) { try { sourceNode.stop(); } catch (e) {} sourceNode = null; }
  isPlaying = false;
}

function playStack() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const loaded = slots.filter(s => s.buffer);
  if (loaded.length === 0) return;

  const maxLen = Math.max(...loaded.map(s => s.buffer.length));
  masterGain = ctx.createGain();
  masterGain.gain.value = parseFloat(document.getElementById('masterVolume').value) / 100;
  masterGain.connect(ctx.destination);

  let endTime = 0;
  loaded.forEach(slot => {
    const src = ctx.createBufferSource();
    const buf = ctx.createBuffer(1, maxLen, SAMPLE_RATE);
    const data = buf.getChannelData(0);
    const srcData = slot.buffer;
    const start = Math.max(0, slot.delaySamples);
    const copyLen = Math.min(srcData.length, maxLen - start);
    for (let i = 0; i < copyLen; i++) data[start + i] = srcData[i] * slot.volume;

    src.buffer = buf;
    const pan = slot.pan;
    const leftGain = ctx.createGain();
    const rightGain = ctx.createGain();
    const l = (1 - Math.max(-pan, 0));
    const r = (1 - Math.max(pan, 0));
    leftGain.gain.value = l;
    rightGain.gain.value = r;
    src.connect(leftGain);
    src.connect(rightGain);
    leftGain.connect(masterGain);
    rightGain.connect(masterGain);

    srcNode = src;
    src.start(0);
    if (start + copyLen > endTime) endTime = start + copyLen;
    src.onended = () => {};
  });
  setTimeout(() => { isPlaying = false; const b = document.getElementById('playBtn'); if (b) b.textContent = '▶'; }, endTime * 1000 / SAMPLE_RATE + 100);
}

function updateMaster() {
  const v = document.getElementById('masterVolume').value / 100;
  document.getElementById('masterVolVal').textContent = v.toFixed(2);
  if (masterGain) masterGain.gain.value = v;
}

function exportWav() {
  const loaded = slots.filter(s => s.buffer);
  if (loaded.length === 0) { showStatus('No IRs loaded'); return; }

  const maxLen = Math.max(...loaded.map(s => s.buffer.length));
  const offline = new OfflineAudioContext(2, maxLen, SAMPLE_RATE);

  loaded.forEach(slot => {
    const buf = offline.createBuffer(1, maxLen, SAMPLE_RATE);
    const data = buf.getChannelData(0);
    const srcData = slot.buffer;
    const start = Math.max(0, slot.delaySamples);
    const copyLen = Math.min(srcData.length, maxLen - start);
    for (let i = 0; i < copyLen; i++) data[start + i] = srcData[i] * slot.volume * (slot.polarity ? -1 : 1);

    const src = offline.createBufferSource();
    src.buffer = buf;
    const leftGain = offline.createGain();
    const rightGain = offline.createGain();
    const pan = slot.pan;
    leftGain.gain.value = 1 - Math.max(-pan, 0);
    rightGain.gain.value = 1 - Math.max(pan, 0);
    src.connect(leftGain);
    src.connect(rightGain);
    leftGain.connect(offline.destination);
    rightGain.connect(offline.destination);
    src.start(0);
  });

  offline.startRendering().then(renderedBuffer => {
    const wav = bufferToWav(renderedBuffer);
    const blob = new Blob([wav], { type: 'audio/wav' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const ts = now.getFullYear() +
      String(now.getMonth() + 1).padStart(2, '0') +
      String(now.getDate()).padStart(2, '0') + '_' +
      String(now.getHours()).padStart(2, '0') +
      String(now.getMinutes()).padStart(2, '0') +
      String(now.getSeconds()).padStart(2, '0');
    a.download = `ir-stacked-${ts}.wav`;
    a.click();
    URL.revokeObjectURL(url);
    showStatus('Exported stacked IR: ' + (maxLen / SAMPLE_RATE * 1000).toFixed(1) + ' ms');
  }).catch(err => showStatus('Export error: ' + err.message));
}

function bufferToWav(buffer) {
  const numCh = buffer.numberOfChannels;
  const sr = buffer.sampleRate;
  const length = buffer.length;

  const data = new Float32Array(length * numCh);
  for (let ch = 0; ch < numCh; ch++) {
    const chData = buffer.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[ch * length + i] = chData[i];
    }
  }

  const bytes = new Int16Array(data.length);
  for (let i = 0; i < data.length; i++) {
    const s = Math.max(-1, Math.min(1, data[i]));
    bytes[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }

  const bufferBytes = bytes.length * 2;
  const totalBytes = 44 + bufferBytes;
  const ab = new ArrayBuffer(totalBytes);
  const view = new DataView(ab);
  const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };

  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + bufferBytes, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numCh, true);
  view.setUint32(24, sr, true);
  view.setUint32(28, sr * numCh * 2, true);
  view.setUint16(32, numCh * 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, bufferBytes, true);

  const uint8 = new Uint8Array(ab);
  const bytesView = new Uint8Array(bytes.buffer);
  for (let i = 0; i < bytesView.length; i++) uint8[44 + i] = bytesView[i];

  return uint8;
}

for (let i = 0; i < 4; i++) addSlot();
drawPhaseHeatmap();
drawMixedWaveform();
</script>
